; Minimal Forgejo configuration shipped by the RPM package.
;
; This file intentionally leaves most settings unset so that Forgejo's
; guided web installer (https://forgejo.org/docs/latest/admin/installation/binary/#forgejos-web-based-configuration)
; can complete first-time setup, including generating SECRET_KEY,
; INTERNAL_TOKEN, JWT_SECRET, choosing the database, and creating the
; admin account.
;
; After completing the web installer, it is strongly recommended to lock
; this file down as described in the docs:
;   sudo chmod 750 /etc/forgejo && sudo chmod 640 /etc/forgejo/app.ini
;
; Full reference: https://forgejo.org/docs/latest/admin/config-cheat-sheet/

RUN_MODE = prod
RUN_USER = git
WORK_PATH = /var/lib/forgejo

[server]
APP_DATA_PATH   = /var/lib/forgejo/data
DOMAIN          = localhost
HTTP_PORT       = 3000
ROOT_URL        = http://localhost:3000/
SSH_DOMAIN      = localhost
LFS_START_SERVER = true

[repository]
ROOT = /var/lib/forgejo/data/forgejo-repositories

[database]
DB_TYPE = sqlite3
PATH    = /var/lib/forgejo/data/forgejo.db

[session]
PROVIDER = file

[log]
MODE     = file
LEVEL    = Info
ROOT_PATH = /var/log/forgejo

[security]
INSTALL_LOCK = false
